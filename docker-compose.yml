services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizzy
      POSTGRES_USER: quizzy
      POSTGRES_PASSWORD: quizzy
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizzy -d quizzy"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://quizzy:quizzy@postgres:5432/quizzy?schema=public
      JWT_SECRET: quizzy-dev-secret
      CLIENT_ORIGIN: http://localhost:${CLIENT_PORT:-4173}
    ports:
      - "${API_PORT:-4001}:4000"
    volumes:
      - quizzy-uploads:/app/server/uploads

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:${API_PORT:-4001}
        VITE_SOCKET_URL: http://localhost:${API_PORT:-4001}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    ports:
      - "${CLIENT_PORT:-4173}:4173"

volumes:
  postgres-data:
  quizzy-uploads:
